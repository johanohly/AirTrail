name: Prepare new release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bump version'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - major
          - minor
          - patch

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump_version:
    runs-on: ubuntu-latest

    outputs:
      ref: ${{ steps.push-tag.outputs.commit_long_sha }}
      version: ${{ steps.version.outputs.app_version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@5d869da34e18e7287c1daad50e0b8ea0f506ce69 # v1
        if: inputs.version != 'false'
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        if: inputs.version != 'false'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: '${{ steps.app-token.outputs.token }}'
      - name: Checkout
        if: inputs.version == 'false'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Bump version
        if: inputs.version != 'false'
        run: scripts/release/bump-version.sh -v "${{ inputs.version }}"

      - name: Resolve release version
        id: version
        run: |
          APP_VERSION="v$(jq -r '.version' package.json)"
          if [ "$APP_VERSION" = "v" ] || [ "$APP_VERSION" = "vnull" ]; then
            echo "Unable to resolve package version"
            exit 1
          fi
          echo "app_version=$APP_VERSION" >>"$GITHUB_OUTPUT"

      - name: Commit and tag
        if: inputs.version != 'false'
        id: push-tag
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          default_author: github_actions
          message: 'chore: version ${{ steps.version.outputs.app_version }}'
          tag: ${{ steps.version.outputs.app_version }}
          push: true

  prepare_release:
    runs-on: ubuntu-latest
    needs: bump_version

    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ needs.bump_version.outputs.ref || github.sha }}

      - name: Create draft release
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2
        with:
          draft: true
          tag_name: ${{ needs.bump_version.outputs.version }}
          target_commitish: ${{ needs.bump_version.outputs.ref || github.sha }}
          generate_release_notes: true
