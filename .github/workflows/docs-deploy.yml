name: Deploy docs

on:
  release:
    types: [released, published]

permissions:
  contents: read

concurrency:
  group: docs-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_ALGOLIA_APP_ID: ${{ vars.NEXT_PUBLIC_ALGOLIA_APP_ID }}
      NEXT_PUBLIC_ALGOLIA_INDEX: ${{ vars.NEXT_PUBLIC_ALGOLIA_INDEX }}
      NEXT_PUBLIC_ALGOLIA_API_KEY: ${{ vars.NEXT_PUBLIC_ALGOLIA_API_KEY }}
      ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      CLOUDFLARE_PAGES_PRODUCTION_BRANCH: ${{ vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Check latest release
        id: latest-release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_RELEASE_ID: ${{ github.event.release.id }}
        run: |
          LATEST_RELEASE_ID="$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq ".id")"

          if [ "$EVENT_RELEASE_ID" = "$LATEST_RELEASE_ID" ]; then
            echo "deploy=true" >>"$GITHUB_OUTPUT"
            echo "Release is latest; deploying docs."
          else
            echo "deploy=false" >>"$GITHUB_OUTPUT"
            echo "Release is not latest; skipping docs deployment."
          fi

      - name: Checkout
        if: steps.latest-release.outputs.deploy == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Bun
        if: steps.latest-release.outputs.deploy == 'true'
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2

      - name: Install dependencies
        if: steps.latest-release.outputs.deploy == 'true'
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        if: steps.latest-release.outputs.deploy == 'true'
        working-directory: docs
        run: bun run build

      - name: Sync Algolia index
        if: steps.latest-release.outputs.deploy == 'true'
        working-directory: docs
        run: bun run sync:algolia

      - name: Deploy Pages project
        if: steps.latest-release.outputs.deploy == 'true'
        working-directory: docs
        run: |
          : "${CLOUDFLARE_PAGES_PROJECT_NAME:?Set the CLOUDFLARE_PAGES_PROJECT_NAME repository variable}"
          PAGES_BRANCH="${CLOUDFLARE_PAGES_PRODUCTION_BRANCH:-main}"
          bunx wrangler pages deploy out \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "$PAGES_BRANCH" \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "$GITHUB_REF_NAME"
